services:
  redis:
    image: redis:alpine
    container_name: miner-redis
    ports:
      - "6379:6379"

  miner:
    build:
      context: ./miner
    container_name: github-miner
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - GITHUB_TOKEN=${GITHUB_TOKEN}

visualizer:
  build:
    context: ./visualizer
  container_name: github-visualizer
  ports:
    - "8501:8501"
  depends_on:
    - redis
  environment:
    - REDIS_HOST=redis
